# Freight Broker - Nginx reverse proxy (HTTP only; SSL은 아래 주석 참고)
# 사용: sudo cp nginx-freight-broker.conf /etc/nginx/sites-available/ && sudo ln -sf /etc/nginx/sites-available/nginx-freight-broker.conf /etc/nginx/sites-enabled/ && sudo nginx -t && sudo systemctl reload nginx
# 도메인 없이 IP만 쓸 때: server_name 192.168.111.137; 또는 _;

upstream backend {
    server 127.0.0.1:8000;
}

upstream frontend {
    server 127.0.0.1:5173;
}

server {
    listen 80;
    server_name _;   # 도메인 있으면 예: freight.example.com

    # API → 백엔드
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 문서/헬스
    location /docs { proxy_pass http://backend; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://backend; proxy_set_header Host $host; }
    location /health { proxy_pass http://backend; proxy_set_header Host $host; }

    # 프론트(SPA)
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS (Let's Encrypt 사용 시)
# 1) certbot 설치: sudo apt install certbot python3-certbot-nginx
# 2) 인증서 발급: sudo certbot --nginx -d your-domain.com
# 3) 아래 server 블록은 certbot이 자동 추가하거나, 수동으로 추가:
#
# server {
#     listen 443 ssl;
#     server_name your-domain.com;
#     ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
#     # ... location 블록은 위와 동일 ...
# }
